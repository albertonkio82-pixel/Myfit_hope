<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#15140F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Energia Metabolica</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --bg: #15140F;
    --surface: #1E1C16;
    --surface-alt: #211F18;
    --border: #2C2A22;
    --border-soft: #252319;
    --text: #F4F0E8;
    --text-muted: #9C9685;
    --text-faint: #6E6A5C;
    --ember: #FF7A30;
    --ember-soft: #3A2618;
    --sage: #8FB996;
    --sage-soft: #202A1F;
    --amber: #E0A23B;
    --amber-soft: #2E2417;
    --red: #E2574C;
    --red-soft: #2E1A18;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }
  .num { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-feature-settings: 'tnum'; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 56px; display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  .row { display: flex; align-items: center; justify-content: space-between; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .text-xs { font-size: 12px; }
  .text-sm { font-size: 14px; }
  .text-lg { font-size: 18px; }
  .text-2xl { font-size: 26px; }
  .muted { color: var(--text-muted); }
  .faint { color: var(--text-faint); }
  .gap-1 { gap: 4px; }
  .gap-2 { gap: 8px; }
  .flex { display: flex; align-items: center; }
  .col { display: flex; flex-direction: column; }
  .flex-1 { flex: 1; }
  .mt-1 { margin-top: 4px; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
  .mb-1 { margin-bottom: 4px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-3 { margin-bottom: 12px; }

  button { font-family: inherit; }
  .btn-primary {
    background: var(--ember); color: #15140F; border: none; border-radius: 10px;
    padding: 10px 16px; font-weight: 600; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-icon { background: none; border: none; cursor: pointer; display: flex; align-items: center; padding: 4px; color: var(--text-muted); }
  .btn-link { background: none; border: none; cursor: pointer; font-size: 12px; text-decoration: underline; width: 100%; padding: 8px 0; }

  input[type="number"], input[type="text"] {
    background: var(--surface-alt); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 14px; width: 100%; appearance: none;
  }
  input:focus, button:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }

  .badge { display: inline-block; font-size: 12px; font-weight: 500; border-radius: 999px; padding: 2px 8px; }

  .progress-track { background: var(--surface-alt); height: 8px; border-radius: 999px; overflow: hidden; }
  .progress-track.thin { height: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--amber), var(--ember)); transition: width .3s ease; }
  .ember-pulse { animation: emberPulse 2.6s ease-in-out infinite; }
  @keyframes emberPulse { 0%, 100% { opacity: 1; } 50% { opacity: .72; } }
  @media (prefers-reduced-motion: reduce) { .ember-pulse { animation: none; } }

  .choice-btn {
    border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface-alt); color: var(--text-muted); text-align: left; font-size: 14px; font-weight: 500;
  }
  .choice-btn.active { background: var(--ember); color: #15140F; border-color: var(--ember); }
  .choice-btn.list { display: block; width: 100%; background: var(--surface-alt); color: var(--text); }
  .choice-btn.list.active { background: var(--ember-soft); border-color: var(--ember); color: var(--text); }
  .choice-btn .hint { color: var(--text-faint); font-size: 12px; font-weight: 400; margin-top: 2px; }

  .day-row { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: var(--surface-alt); }
  .day-row.done { border-color: var(--sage); background: var(--sage-soft); }
  .day-row-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; }
  .day-row-exercises { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 4px; }

  .range-pill { font-size: 12px; border-radius: 6px; padding: 2px 8px; border: 1px solid transparent; background: transparent; color: var(--text-faint); cursor: pointer; }
  .range-pill.active { border-color: var(--ember); color: var(--ember); background: var(--ember-soft); }

  .history-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
  .history-list { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }

  a, a:visited { color: inherit; }
  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .setup-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ---------------------------------------------------------------------------
// Costanti e dati statici
// ---------------------------------------------------------------------------
const STORAGE_KEY = "metabolismo-tracker-data";

const ACTIVITY_OPTIONS = [
  { id: "sedentario", label: "Sedentario", hint: "poco o nessun esercizio", mult: 1.2 },
  { id: "leggero", label: "Leggero", hint: "1-3 giorni/sett.", mult: 1.375 },
  { id: "moderato", label: "Moderato", hint: "3-5 giorni/sett.", mult: 1.55 },
  { id: "intenso", label: "Intenso", hint: "6-7 giorni/sett.", mult: 1.725 },
];

const RANGE_OPTIONS = [
  { id: 7, label: "7g" },
  { id: 30, label: "30g" },
  { id: 90, label: "90g" },
  { id: 0, label: "Tutto" },
];

const WORKOUT_PLAN = [
  {
    id: "A",
    title: "Giorno A — Forza",
    subtitle: "Manubri + parallettes",
    exercises: [
      "Squat con manubri — 3x12",
      "Affondi alternati con manubri — 3x10/lato",
      "Piegamenti sui parallettes — 3x10-15",
      "Rematore curvo con manubri — 3x12",
      "Plank sui parallettes — 3x30-45s",
    ],
  },
  {
    id: "B",
    title: "Giorno B — Circuito metabolico",
    subtitle: "4 giri · 30s lavoro / 15s recupero, 60s tra giri",
    exercises: [
      "Squat con manubri",
      "Mountain climber sui parallettes",
      "Affondi con manubri",
      "Piegamenti sui parallettes",
      "Jumping jack",
    ],
  },
  {
    id: "C",
    title: "Giorno C — Forza 2",
    subtitle: "Manubri + parallettes",
    exercises: [
      "Stacco da terra con manubri — 3x12",
      "Shoulder press con manubri — 3x10",
      "Pike push-up sui parallettes — 3x8-10",
      "Affondi laterali con manubri — 3x10/lato",
      "Russian twist con manubri — 3x20",
    ],
  },
];

// ---------------------------------------------------------------------------
// Utility di calcolo
// ---------------------------------------------------------------------------
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function formatDateShort(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString("it-IT", { day: "numeric", month: "short" });
}
function calcBMI(weightKg, heightCm) {
  const h = heightCm / 100;
  return weightKg / (h * h);
}
function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: "Sottopeso", color: "var(--red)", soft: "var(--red-soft)" };
  if (bmi < 25) return { label: "Normopeso", color: "var(--sage)", soft: "var(--sage-soft)" };
  if (bmi < 30) return { label: "Sovrappeso", color: "var(--amber)", soft: "var(--amber-soft)" };
  return { label: "Obesità", color: "var(--red)", soft: "var(--red-soft)" };
}
function calcBMR(weightKg, heightCm, age, sex) {
  const base = 10 * weightKg + 6.25 * heightCm - 5 * age;
  return sex === "M" ? base + 5 : base - 161;
}
function idealWeightRange(heightCm) {
  const h = heightCm / 100;
  return { min: 18.5 * h * h, max: 24.9 * h * h };
}
function getActivity(id) {
  return ACTIVITY_OPTIONS.find((a) => a.id === id) || ACTIVITY_OPTIONS[2];
}
function getWeekKey(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diffToMonday);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// ---------------------------------------------------------------------------
// Stato applicativo (persistito su localStorage: dati legati a questo browser/dispositivo)
// ---------------------------------------------------------------------------
let profile = null;
let entries = [];
let workouts = {};
let showSettings = false;
let range = 30;
let weightInputVal = "83";
let saveError = "";
let expandedDay = null;
let formHeight = "178";
let formAge = "35";
let formSex = "M";
let formActivity = "moderato";
let chartInstance = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      profile = parsed.profile || null;
      entries = parsed.entries || [];
      workouts = parsed.workouts || {};
      if (profile) {
        formHeight = String(profile.height);
        formAge = String(profile.age);
        formSex = profile.sex;
        formActivity = profile.activity;
      }
    }
  } catch (e) {
    // dati assenti o corrotti: si parte da zero
  }
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ profile, entries, workouts }));
    saveError = "";
  } catch (e) {
    saveError = "Errore di salvataggio, riprova.";
  }
}

// ---------------------------------------------------------------------------
// Azioni
// ---------------------------------------------------------------------------
function handleSaveProfile() {
  const h = parseFloat(formHeight);
  const a = parseInt(formAge, 10);
  if (!h || !a) return;
  profile = { height: h, age: a, sex: formSex, activity: formActivity };
  showSettings = false;
  saveData();
  render();
}
function handleAddEntry() {
  const w = parseFloat(String(weightInputVal).replace(",", "."));
  if (!w || w <= 0) return;
  const today = todayISO();
  const idx = entries.findIndex((e) => e.date === today);
  if (idx >= 0) entries[idx] = { ...entries[idx], weight: w };
  else entries.push({ id: `${today}-${Date.now()}`, date: today, weight: w });
  entries.sort((a, b) => (a.date > b.date ? 1 : -1));
  saveData();
  render();
}
function handleDeleteEntry(id) {
  entries = entries.filter((e) => e.id !== id);
  saveData();
  render();
}
function handleReset() {
  if (!confirm("Eliminare tutti i dati salvati su questo dispositivo? L'operazione non è reversibile.")) return;
  profile = null;
  entries = [];
  workouts = {};
  saveData();
  render();
}
function toggleWorkoutDay(dayId) {
  const weekKey = getWeekKey();
  const currentWeek = workouts[weekKey] || {};
  workouts[weekKey] = { ...currentWeek, [dayId]: !currentWeek[dayId] };
  saveData();
  render();
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function renderSetup() {
  return `
    <div class="center-screen">
      <div class="setup-card">
        <div class="row mb-1">
          <h1 class="text-lg" style="font-weight:600;margin:0;">${profile ? "Impostazioni" : "Imposta il tuo profilo"}</h1>
          ${profile ? `<button class="btn-icon" data-action="close-settings" aria-label="Chiudi"><i data-lucide="x" style="width:20px;height:20px"></i></button>` : ""}
        </div>
        <p class="faint text-xs mb-3" style="margin-top:0;">Servono per calcolare BMI, metabolismo basale (BMR) e fabbisogno calorico (TDEE).</p>

        <div class="col gap-2">
          <label class="col gap-1">
            <span class="muted text-xs">Altezza (cm)</span>
            <input type="number" data-bind="formHeight" value="${formHeight}" />
          </label>
          <label class="col gap-1">
            <span class="muted text-xs">Età</span>
            <input type="number" data-bind="formAge" value="${formAge}" />
          </label>
          <div class="col gap-1">
            <span class="muted text-xs">Sesso</span>
            <div class="flex gap-2">
              <button class="choice-btn flex-1 ${formSex === "M" ? "active" : ""}" data-action="set-sex" data-value="M" style="text-align:center;">Uomo</button>
              <button class="choice-btn flex-1 ${formSex === "F" ? "active" : ""}" data-action="set-sex" data-value="F" style="text-align:center;">Donna</button>
            </div>
          </div>
          <div class="col gap-1">
            <span class="muted text-xs">Livello di attività</span>
            <div class="col gap-2">
              ${ACTIVITY_OPTIONS.map(a => `
                <button class="choice-btn list ${formActivity === a.id ? "active" : ""}" data-action="set-activity" data-value="${a.id}">
                  ${a.label}
                  <div class="hint">${a.hint}</div>
                </button>
              `).join("")}
            </div>
          </div>
        </div>

        <button class="btn-primary" style="width:100%;margin-top:18px;" data-action="save-profile">${profile ? "Salva modifiche" : "Inizia"}</button>
        ${profile ? `<button class="btn-link" style="color:var(--red);" data-action="reset-data">Elimina tutti i dati</button>` : ""}
      </div>
    </div>
  `;
}

function renderDashboard() {
  const latest = entries.length ? entries[entries.length - 1] : null;

  let weekAgoEntry = null;
  if (latest) {
    const latestDate = new Date(latest.date);
    for (const e of entries) {
      const diffDays = (latestDate - new Date(e.date)) / 86400000;
      if (diffDays >= 6 && diffDays <= 8) weekAgoEntry = e;
    }
    if (!weekAgoEntry) {
      weekAgoEntry = entries.find((e) => {
        const diffDays = (latestDate - new Date(e.date)) / 86400000;
        return diffDays > 0 && diffDays <= 10;
      }) || null;
    }
  }

  const bmi = profile && latest ? calcBMI(latest.weight, profile.height) : null;
  const bmiCat = bmi ? bmiCategory(bmi) : null;
  const ideal = profile ? idealWeightRange(profile.height) : null;
  const bmr = profile && latest ? calcBMR(latest.weight, profile.height, profile.age, profile.sex) : null;
  const activity = profile ? getActivity(profile.activity) : null;
  const tdee = bmr && activity ? bmr * activity.mult : null;
  const deltaWeek = latest && weekAgoEntry ? +(latest.weight - weekAgoEntry.weight).toFixed(1) : null;
  const bmrGaugePct = bmr ? Math.min(100, Math.max(4, ((bmr - 1000) / (2400 - 1000)) * 100)) : 0;

  const currentWeekKey = getWeekKey();
  const currentWeekWorkouts = workouts[currentWeekKey] || {};
  const completedCount = WORKOUT_PLAN.filter((d) => currentWeekWorkouts[d.id]).length;

  let deltaIcon = "minus", deltaColor = "var(--text-faint)";
  if (deltaWeek !== null) {
    if (deltaWeek < 0) { deltaIcon = "trending-down"; deltaColor = "var(--sage)"; }
    else if (deltaWeek > 0) { deltaIcon = "trending-up"; deltaColor = "var(--red)"; }
  }

  return `
    <div class="container">
      <div class="row">
        <div class="flex gap-2">
          <i data-lucide="flame" style="width:20px;height:20px;color:var(--ember)"></i>
          <h1 class="text-sm" style="font-weight:600;margin:0;">Energia Metabolica</h1>
        </div>
        <button class="btn-icon" data-action="open-settings" aria-label="Impostazioni"><i data-lucide="settings" style="width:19px;height:19px"></i></button>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="flex gap-1 mb-1"><i data-lucide="scale" style="width:13px;height:13px;color:var(--text-faint)"></i><span class="faint text-xs">Peso attuale</span></div>
          <div class="flex gap-1" style="align-items:baseline;">
            <span class="num text-2xl" style="font-weight:600;">${latest ? latest.weight : "—"}</span>
            <span class="faint text-xs">kg</span>
          </div>
          ${deltaWeek !== null ? `
            <div class="flex gap-1 mt-1">
              <i data-lucide="${deltaIcon}" style="width:13px;height:13px;color:${deltaColor}"></i>
              <span class="num text-xs" style="color:${deltaColor}">${deltaWeek > 0 ? "+" : ""}${deltaWeek} kg / 7g</span>
            </div>` : ""}
        </div>
        <div class="card">
          <span class="faint text-xs">BMI</span>
          <div class="flex gap-1 mt-1" style="align-items:baseline;">
            <span class="num text-2xl" style="font-weight:600;">${bmi ? bmi.toFixed(1) : "—"}</span>
          </div>
          ${bmiCat ? `<span class="badge mt-1" style="color:${bmiCat.color};background:${bmiCat.soft};">${bmiCat.label}</span>` : ""}
        </div>
      </div>

      <div class="card">
        <div class="row mb-2">
          <div class="flex gap-1"><i data-lucide="flame" class="ember-pulse" style="width:14px;height:14px;color:var(--ember)"></i><span class="faint text-xs">Metabolismo basale (BMR)</span></div>
          <span class="num text-lg" style="font-weight:600;color:var(--ember)">${bmr ? Math.round(bmr) : "—"} <span class="faint text-xs" style="font-weight:400">kcal/die</span></span>
        </div>
        <div class="progress-track"><div class="progress-fill ember-pulse" style="width:${bmrGaugePct}%"></div></div>
        <div class="row mt-3" style="padding-top:12px;border-top:1px solid var(--border-soft);">
          <span class="faint text-xs">Fabbisogno totale (TDEE)</span>
          <span class="num text-sm" style="font-weight:500">${tdee ? Math.round(tdee) : "—"} kcal/die</span>
        </div>
        <div class="row" style="margin-top:6px;">
          <span class="faint text-xs">Target per perdere ~0,5 kg/sett.</span>
          <span class="num text-sm" style="font-weight:500;color:var(--sage)">${tdee ? Math.round(tdee - 500) : "—"} kcal/die</span>
        </div>
        ${ideal ? `
          <div class="row" style="margin-top:6px;">
            <span class="faint text-xs">Peso ideale stimato</span>
            <span class="num text-sm" style="font-weight:500">${ideal.min.toFixed(0)}–${ideal.max.toFixed(0)} kg</span>
          </div>` : ""}
      </div>

      <div class="card">
        <div class="row mb-3">
          <div class="flex gap-1"><i data-lucide="dumbbell" style="width:14px;height:14px;color:var(--ember)"></i><span class="faint text-xs">Allenamenti questa settimana</span></div>
          <span class="num text-sm" style="font-weight:600">${completedCount}/${WORKOUT_PLAN.length}</span>
        </div>
        <div class="progress-track thin mb-3"><div class="progress-fill" style="width:${(completedCount / WORKOUT_PLAN.length) * 100}%"></div></div>
        <div class="col gap-2">
          ${WORKOUT_PLAN.map((day) => {
            const done = !!currentWeekWorkouts[day.id];
            const expanded = expandedDay === day.id;
            return `
              <div class="day-row ${done ? "done" : ""}">
                <div class="day-row-head">
                  <button class="btn-icon" style="padding:0;" data-action="toggle-workout-day" data-day="${day.id}" aria-label="Segna come fatto">
                    <i data-lucide="${done ? "check-circle-2" : "circle"}" style="width:20px;height:20px;color:${done ? "var(--sage)" : "var(--text-faint)"}"></i>
                  </button>
                  <button class="flex-1 row" style="background:none;border:none;cursor:pointer;text-align:left;padding:0;" data-action="toggle-expand-day" data-day="${day.id}">
                    <div>
                      <div class="text-sm" style="font-weight:500;color:${done ? "var(--sage)" : "var(--text)"}">${day.title}</div>
                      <div class="faint text-xs">${day.subtitle}</div>
                    </div>
                    <i data-lucide="${expanded ? "chevron-up" : "chevron-down"}" style="width:16px;height:16px;color:var(--text-faint)"></i>
                  </button>
                </div>
                ${expanded ? `
                  <div class="day-row-exercises">
                    ${day.exercises.map((ex, i) => `<div class="muted text-xs flex gap-1"><span class="faint">${i + 1}.</span>${ex}</div>`).join("")}
                  </div>` : ""}
              </div>
            `;
          }).join("")}
        </div>
        <div class="faint text-xs mt-3">Nei giorni liberi: camminata 20-30 min.</div>
      </div>

      <div class="card">
        <div class="row mb-2">
          <span class="faint text-xs">Andamento peso</span>
          <div class="flex gap-1">
            ${RANGE_OPTIONS.map(r => `<button class="range-pill ${range === r.id ? "active" : ""}" data-action="set-range" data-value="${r.id}">${r.label}</button>`).join("")}
          </div>
        </div>
        ${entries.length > 1
          ? `<div style="width:100%;height:170px;"><canvas id="weightChart"></canvas></div>`
          : `<div class="faint text-xs" style="text-align:center;padding:32px 0;">Aggiungi almeno due pesate per vedere il grafico.</div>`}
      </div>

      <div class="card">
        <span class="faint text-xs mb-2" style="display:block;">Pesata di oggi</span>
        <div class="flex gap-2">
          <input type="number" inputmode="decimal" data-bind="weightInputVal" value="${weightInputVal}" placeholder="kg" />
          <button class="btn-primary" data-action="add-entry"><i data-lucide="plus" style="width:16px;height:16px"></i>Salva</button>
        </div>
        ${saveError ? `<span class="text-xs mt-2" style="display:block;color:var(--red)">${saveError}</span>` : ""}
      </div>

      ${entries.length > 0 ? `
        <div class="card">
          <span class="faint text-xs mb-2" style="display:block;">Storico</span>
          <div class="history-list">
            ${entries.slice().reverse().map(e => `
              <div class="history-item">
                <span class="muted text-xs">${formatDateShort(e.date)}</span>
                <span class="num text-sm">${e.weight} kg</span>
                <button class="btn-icon" data-action="delete-entry" data-id="${e.id}" aria-label="Elimina">
                  <i data-lucide="trash-2" style="width:14px;height:14px;color:var(--text-faint)"></i>
                </button>
              </div>
            `).join("")}
          </div>
        </div>
      ` : ""}
    </div>
  `;
}

// Plugin Chart.js leggero per disegnare le linee del range di peso ideale, senza dipendenze extra
const idealRangePlugin = {
  id: "idealRange",
  afterDatasetsDraw(chart, args, opts) {
    if (!opts || opts.min == null || opts.max == null) return;
    const { ctx, chartArea, scales } = chart;
    const yMin = scales.y.getPixelForValue(opts.min);
    const yMax = scales.y.getPixelForValue(opts.max);
    ctx.save();
    ctx.strokeStyle = "#8FB996";
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 1;
    [yMin, yMax].forEach((y) => {
      ctx.beginPath();
      ctx.moveTo(chartArea.left, y);
      ctx.lineTo(chartArea.right, y);
      ctx.stroke();
    });
    ctx.restore();
  },
};

function renderChart() {
  const canvas = document.getElementById("weightChart");
  if (!canvas) return;
  let filtered = entries;
  if (range > 0 && entries.length) {
    const lastDate = new Date(entries[entries.length - 1].date);
    filtered = entries.filter((e) => (lastDate - new Date(e.date)) / 86400000 <= range);
  }
  const labels = filtered.map((e) => formatDateShort(e.date));
  const data = filtered.map((e) => e.weight);
  const ideal = profile ? idealWeightRange(profile.height) : null;

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  chartInstance = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data,
        borderColor: "#FF7A30",
        backgroundColor: "#FF7A30",
        borderWidth: 2.5,
        pointRadius: 3,
        tension: 0.35,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        idealRange: ideal ? { min: ideal.min, max: ideal.max } : null,
        tooltip: {
          backgroundColor: "#211F18",
          borderColor: "#2C2A22",
          borderWidth: 1,
          titleColor: "#9C9685",
          bodyColor: "#F4F0E8",
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: "#6E6A5C", font: { size: 11 } } },
        y: { grid: { color: "#252319" }, ticks: { color: "#6E6A5C", font: { size: 11 } } },
      },
    },
    plugins: [idealRangePlugin],
  });
}

function render() {
  const app = document.getElementById("app");
  if (!profile || showSettings) {
    app.innerHTML = renderSetup();
  } else {
    app.innerHTML = renderDashboard();
  }
  if (window.lucide) lucide.createIcons();
  if (profile && !showSettings && entries.length > 1) renderChart();
}

// ---------------------------------------------------------------------------
// Event delegation: un solo listener per click e per input, niente re-bind ad ogni render
// ---------------------------------------------------------------------------
document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;
  switch (action) {
    case "open-settings": showSettings = true; render(); break;
    case "close-settings": showSettings = false; render(); break;
    case "set-sex": formSex = t.dataset.value; render(); break;
    case "set-activity": formActivity = t.dataset.value; render(); break;
    case "save-profile": handleSaveProfile(); break;
    case "reset-data": handleReset(); break;
    case "add-entry": handleAddEntry(); break;
    case "delete-entry": handleDeleteEntry(t.dataset.id); break;
    case "set-range": range = Number(t.dataset.value); render(); break;
    case "toggle-workout-day": toggleWorkoutDay(t.dataset.day); break;
    case "toggle-expand-day": expandedDay = expandedDay === t.dataset.day ? null : t.dataset.day; render(); break;
  }
});

document.addEventListener("input", (e) => {
  const bind = e.target.dataset.bind;
  if (!bind) return;
  if (bind === "formHeight") formHeight = e.target.value;
  else if (bind === "formAge") formAge = e.target.value;
  else if (bind === "weightInputVal") weightInputVal = e.target.value;
});

// ---------------------------------------------------------------------------
// Avvio
// ---------------------------------------------------------------------------
loadData();
render();
</script>
</body>
</html>
